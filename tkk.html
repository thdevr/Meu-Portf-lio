<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aperte qualquer tecla</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: monospace;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:#00ff9f;
overflow:hidden;
}

.container{
text-align:center;
}

h1{
font-size:3rem;
letter-spacing:3px;
text-shadow:0 0 10px #00ff9f, 0 0 20px #00ff9f;
animation: blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

.small{
margin-top:20px;
font-size:1rem;
opacity:0.7;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#00ff9f;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.overlay.active{
opacity:1;
}
</style>
</head>

<body>

<div class="overlay" id="flash"></div>

<div class="container">
<p class="small">PARA INCIAR</p>
<h1>APERTE QUALQUER TECLA</h1>

</div>

<script>

document.addEventListener("keydown", () => {
const flash = document.getElementById("flash")
flash.classList.add("active")

setTimeout(()=>{
flash.classList.remove("active")
},200)
})

</script>

</body>
</html>
